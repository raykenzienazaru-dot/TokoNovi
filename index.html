<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=yes"/>
<title>Novi.Shope - Toko Online Modern</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #08080E;
  --bg-card: #0F0F1A;
  --bg-elevated: #161622;
  --bg-input: #12121C;
  --bg-hover: #1C1C2A;
  --border: rgba(255,255,255,0.055);
  --border-md: rgba(255,255,255,0.09);
  --border-strong: rgba(255,255,255,0.14);
  --brand: #FF6240;
  --brand2: #FF8C5A;
  --brand3: #FFBB87;
  --brand-dim: rgba(255,98,64,0.10);
  --brand-ring: rgba(255,98,64,0.35);
  --text: #EDE9E3;
  --text-muted: #7A7688;
  --text-dim: #383549;
  --success: #1FD4A0;
  --danger: #FF4060;
  --warning: #FFB200;
  --info: #3DB9F5;
  --success-bg: rgba(31,212,160,0.08);
  --danger-bg: rgba(255,64,96,0.08);
  --warning-bg: rgba(255,178,0,0.08);
  --info-bg: rgba(61,185,245,0.08);
  --r-xs: 6px;
  --r-sm: 10px;
  --r: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --font: 'Plus Jakarta Sans', sans-serif;
  --font-serif: 'Fraunces', serif;
  --nav-h: 66px;
  --shadow-brand: 0 8px 32px rgba(255,98,64,0.25);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

.hidden { display: none !important; }

/* LOADER */
#app-loader {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.5s var(--ease), visibility 0.5s;
}

#app-loader.fade-out {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader-wordmark {
  display: flex;
  align-items: center;
  gap: 10px;
}

.loader-icon {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--brand), var(--brand2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  animation: pulse-icon 2s ease infinite;
}

.loader-name {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}

.loader-bar {
  width: 200px;
  height: 3px;
  background: var(--bg-elevated);
  border-radius: 99px;
  overflow: hidden;
}

.loader-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brand), var(--brand3));
  border-radius: 99px;
  animation: load-progress 1.8s ease forwards;
}

@keyframes pulse-icon {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(0.93); }
}

@keyframes load-progress {
  from { width: 0%; }
  to { width: 100%; }
}

@keyframes slide-up {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slide-in-right {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

/* TOAST */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}

.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 500;
  pointer-events: all;
  animation: slide-in-right 0.35s var(--spring) both;
  backdrop-filter: blur(24px);
  border: 1px solid;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.toast.success {
  background: rgba(15, 26, 22, 0.95);
  border-color: rgba(31, 212, 160, 0.3);
  color: var(--success);
}

.toast.error {
  background: rgba(26, 10, 15, 0.95);
  border-color: rgba(255, 64, 96, 0.3);
  color: var(--danger);
}

.toast.info {
  background: rgba(10, 18, 26, 0.95);
  border-color: rgba(61, 185, 245, 0.3);
  color: var(--info);
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 800;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s var(--ease);
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-xl);
  padding: 32px;
  width: 100%;
  max-width: 500px;
  transform: translateY(24px) scale(0.97);
  transition: transform 0.3s var(--spring);
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
}

.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-title {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
  letter-spacing: -0.01em;
}

.modal-close {
  position: absolute;
  top: 18px;
  right: 18px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-md);
  color: var(--text-muted);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.modal-close:hover {
  color: var(--text);
  background: var(--bg-hover);
  border-color: var(--border-strong);
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 11px 20px;
  border-radius: var(--r-sm);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s var(--ease);
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--brand), var(--brand2));
  color: #fff;
  box-shadow: var(--shadow-brand);
}

.btn-primary:hover {
  box-shadow: 0 12px 40px rgba(255, 98, 64, 0.4);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg-elevated);
  border: 1px solid var(--border-md);
  color: var(--text);
}

.btn-secondary:hover {
  border-color: var(--brand);
  color: var(--brand);
}

.btn-danger {
  background: var(--danger-bg);
  border: 1px solid rgba(255, 64, 96, 0.3);
  color: var(--danger);
}

.btn-danger:hover {
  background: rgba(255, 64, 96, 0.14);
}

.btn-sm {
  padding: 8px 14px;
  font-size: 13px;
}

.btn-full {
  width: 100%;
}

/* FORMS */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 7px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.form-label.required::after {
  content: ' *';
  color: var(--brand);
}

.form-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-md);
  border-radius: var(--r-sm);
  padding: 13px 16px;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  transition: all 0.2s var(--ease);
  outline: none;
}

.form-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-dim);
}

/* NAVBAR */
#navbar {
  position: sticky;
  top: 0;
  z-index: 200;
  height: var(--nav-h);
  background: rgba(8, 8, 14, 0.88);
  backdrop-filter: blur(28px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  flex-shrink: 0;
}

.nav-brand-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--brand), var(--brand2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.nav-brand-name {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.nav-icon-btn {
  position: relative;
  width: 38px;
  height: 38px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  color: var(--text-muted);
}

.nav-icon-btn:hover {
  border-color: var(--border-strong);
  color: var(--text);
  background: var(--bg-hover);
}

.nav-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: var(--brand);
  color: #fff;
  min-width: 18px;
  height: 18px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  border: 2px solid var(--bg);
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-md);
  border-radius: 99px;
  padding: 5px 14px 5px 5px;
  cursor: pointer;
}

.nav-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand), var(--brand2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  color: #fff;
}

/* PAGES */
.page {
  display: none;
  padding: 32px 28px;
  max-width: 1320px;
  margin: 0 auto;
  min-height: calc(100vh - var(--nav-h));
}

.page.active {
  display: block;
  animation: slide-up 0.35s var(--ease) both;
}

/* AUTH PAGE */
#page-auth {
  display: none;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

#page-auth.active {
  display: flex;
}

.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 32px;
  padding: 52px 44px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}

.auth-icon {
  width: 72px;
  height: 72px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--brand), var(--brand2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  margin: 0 auto 16px;
  box-shadow: 0 16px 40px rgba(255, 98, 64, 0.35);
}

.auth-title {
  font-family: var(--font-serif);
  font-size: 34px;
  font-weight: 700;
  color: var(--text);
}

.auth-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 4px;
}

.auth-input {
  width: 100%;
  background: var(--bg-input);
  border: 1.5px solid var(--border-md);
  border-radius: 12px;
  padding: 15px 16px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  margin: 16px 0;
}

.auth-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 4px var(--brand-dim);
}

.auth-submit {
  width: 100%;
  padding: 16px;
  font-size: 15px;
  font-weight: 700;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, var(--brand), var(--brand2));
  color: #fff;
}

/* PRODUCT GRID */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.product-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s var(--ease);
}

.product-card:hover {
  border-color: var(--brand-ring);
  transform: translateY(-5px);
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
}

.prod-image-wrap {
  aspect-ratio: 1;
  width: 100%;
  overflow: hidden;
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
}

.prod-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.prod-body {
  padding: 16px;
}

.prod-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
}

.prod-price {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  color: var(--brand);
}

/* CART SIDEBAR */
.cart-overlay {
  position: fixed;
  inset: 0;
  z-index: 499;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(6px);
  display: none;
}

.cart-overlay.open {
  display: block;
}

#cart-sidebar {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 400px;
  max-width: 100vw;
  background: var(--bg-card);
  border-left: 1px solid var(--border-strong);
  z-index: 500;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.35s var(--ease);
}

#cart-sidebar.open {
  transform: translateX(0);
}

.cart-header {
  padding: 22px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-title {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
}

.cart-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.cart-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
}

.cart-total-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 16px;
}

.cart-total-value {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  color: var(--brand);
}

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  display: block;
}

@media (max-width: 768px) {
  .page {
    padding: 20px 16px;
  }
  
  .products-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  
  #cart-sidebar {
    width: 100%;
  }
  
  .nav-user {
    display: none;
  }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="app-loader">
  <div class="loader-wordmark">
    <div class="loader-icon">🛍️</div>
    <div class="loader-name">Novi.Shope</div>
  </div>
  <div class="loader-bar">
    <div class="loader-bar-fill"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- CART OVERLAY & SIDEBAR -->
<div class="cart-overlay" id="cart-overlay"></div>
<div id="cart-sidebar">
  <div class="cart-header">
    <div class="cart-title">Keranjang Belanja</div>
    <button class="modal-close" onclick="App.closeCart()" style="position:static;">✕</button>
  </div>
  <div class="cart-body" id="cart-items-list">
    <div class="empty-state">
      <span class="empty-icon">🛒</span>
      <div>Keranjang masih kosong</div>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span class="cart-total-value" id="cart-total">Rp 0</span>
    </div>
    <button class="btn btn-primary btn-full" onclick="App.checkout()">Checkout</button>
  </div>
</div>

<!-- NAVBAR -->
<nav id="navbar" class="hidden">
  <div class="nav-brand" onclick="App.navigate('store')">
    <div class="nav-brand-icon">🛍️</div>
    <div class="nav-brand-name">Novi.Shope</div>
  </div>
  <div class="nav-actions">
    <div class="nav-icon-btn" onclick="App.openCart()">
      🛒
      <span class="nav-badge hidden" id="cart-count">0</span>
    </div>
    <div class="nav-user" onclick="App.showUserInfo()">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <span id="nav-email">User</span>
    </div>
  </div>
</nav>

<!-- AUTH PAGE -->
<div id="page-auth" class="active">
  <div class="auth-card">
    <div class="auth-icon">🛍️</div>
    <div class="auth-title">Novi.Shope</div>
    <div class="auth-subtitle">Belanja mudah & terpercaya</div>
    <input type="email" class="auth-input" id="login-email" placeholder="Masukkan email Anda" onkeypress="if(event.key==='Enter')App.login()">
    <button class="auth-submit" onclick="App.login()">Masuk</button>
    <p style="margin-top: 16px; font-size: 12px; color: var(--text-muted);">✨ Cukup masukkan email untuk mulai berbelanja</p>
  </div>
</div>

<!-- STORE PAGE -->
<div id="page-store" class="page">
  <div style="margin-bottom: 24px;">
    <h1 style="font-family: var(--font-serif); font-size: 28px;">✨ Produk Unggulan</h1>
    <p style="color: var(--text-muted); margin-top: 8px;">Temukan produk favoritmu disini</p>
  </div>
  <div class="products-grid" id="products-grid"></div>
</div>

<script>
// ==================== KONFIGURASI ====================
const SUPABASE_URL = 'https://vtozhwkvhtjfytmqdxkf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_6eb_n7WUi2AZascv7bnwNQ_D75nSZsf';
const ADMIN_EMAILS = ['raykenzienazaru@gmail.com', 'noviantinovianti170@gmail.com'];

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== STATE ====================
let AppState = {
  user: null,
  products: [],
  cart: [],
  currentPage: 'auth'
};

// ==================== HELPER FUNCTIONS ====================
function formatRupiah(amount) {
  return 'Rp ' + new Intl.NumberFormat('id-ID').format(amount);
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function saveUserToLocalStorage(user) {
  localStorage.setItem('novi_user', JSON.stringify(user));
}

function loadUserFromLocalStorage() {
  const saved = localStorage.getItem('novi_user');
  if (saved) {
    try {
      return JSON.parse(saved);
    } catch(e) {
      return null;
    }
  }
  return null;
}

function clearUserFromLocalStorage() {
  localStorage.removeItem('novi_user');
}

// ==================== APP CORE ====================
const App = {
  async init() {
    // Sembunyikan loader setelah 1 detik
    setTimeout(() => {
      const loader = document.getElementById('app-loader');
      loader.classList.add('fade-out');
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500);
    }, 1000);

    // Cek user yang sudah login
    const savedUser = loadUserFromLocalStorage();
    if (savedUser && savedUser.email) {
      AppState.user = savedUser;
      await this.loadProducts();
      this.updateUIForLoggedInUser();
      this.navigate('store');
    } else {
      this.showAuth();
    }
  },

  showAuth() {
    AppState.currentPage = 'auth';
    document.getElementById('page-auth').classList.add('active');
    document.getElementById('page-store').classList.remove('active');
    document.getElementById('navbar').classList.add('hidden');
  },

  async login() {
    const emailInput = document.getElementById('login-email');
    const email = emailInput.value.trim().toLowerCase();
    
    if (!email) {
      showToast('Masukkan email terlebih dahulu', 'error');
      return;
    }
    
    if (!email.includes('@') || !email.includes('.')) {
      showToast('Email tidak valid', 'error');
      return;
    }
    
    // Simpan user
    AppState.user = {
      email: email,
      isAdmin: ADMIN_EMAILS.includes(email)
    };
    
    saveUserToLocalStorage(AppState.user);
    
    // Load produk
    await this.loadProducts();
    
    // Update UI
    this.updateUIForLoggedInUser();
    
    // Navigasi ke store
    this.navigate('store');
    
    showToast(`Selamat datang, ${email.split('@')[0]}! 👋`, 'success');
    emailInput.value = '';
  },

  async logout() {
    // Reset state sepenuhnya
    AppState.user = null;
    AppState.cart = [];
    AppState.products = [];
    AppState.currentPage = 'auth';
    
    // Clear localStorage
    clearUserFromLocalStorage();
    
    // Update UI
    this.updateCartBadge();
    this.renderCart();
    
    // Tutup sidebar jika terbuka
    this.closeCart();
    
    // Tampilkan auth page
    document.getElementById('page-auth').classList.add('active');
    document.getElementById('page-store').classList.remove('active');
    document.getElementById('navbar').classList.add('hidden');
    
    // Bersihkan input email
    document.getElementById('login-email').value = '';
    
    showToast('Berhasil keluar', 'info');
  },

  updateUIForLoggedInUser() {
    if (!AppState.user) return;
    
    const email = AppState.user.email;
    const name = email.split('@')[0];
    const initial = name.charAt(0).toUpperCase();
    
    document.getElementById('nav-avatar').textContent = initial;
    document.getElementById('nav-email').textContent = name;
    document.getElementById('navbar').classList.remove('hidden');
    document.getElementById('page-auth').classList.remove('active');
  },

  async loadProducts() {
    try {
      const { data, error } = await supabase
        .from('products')
        .select('*')
        .eq('is_active', true)
        .order('created_at', { ascending: false });
      
      if (error) throw error;
      
      AppState.products = data || [];
      this.renderProducts();
    } catch (err) {
      console.error('Error loading products:', err);
      showToast('Gagal memuat produk', 'error');
      AppState.products = [];
      this.renderProducts();
    }
  },

  renderProducts() {
    const grid = document.getElementById('products-grid');
    
    if (!AppState.products.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <span class="empty-icon">📦</span>
          <div>Belum ada produk</div>
          <div style="font-size: 13px; margin-top: 8px;">Silakan tambahkan produk terlebih dahulu</div>
        </div>
      `;
      return;
    }
    
    grid.innerHTML = AppState.products.map(product => `
      <div class="product-card" onclick="App.openProductModal(${JSON.stringify(product).replace(/"/g, '&quot;')})">
        <div class="prod-image-wrap">
          ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}">` : '📦'}
        </div>
        <div class="prod-body">
          <div class="prod-name">${this.escapeHtml(product.name)}</div>
          <div class="prod-price">${formatRupiah(product.price)}</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">Stok: ${product.stock}</div>
        </div>
      </div>
    `).join('');
  },

  escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  },

  openProductModal(product) {
    if (!AppState.user) {
      showToast('Silakan login terlebih dahulu', 'error');
      return;
    }
    
    if (product.stock <= 0) {
      showToast('Stok produk habis', 'error');
      return;
    }
    
    AppState.selectedProduct = product;
    AppState.selectedQty = 1;
    
    // Buat modal sederhana
    this.showQuantityModal(product);
  },

  showQuantityModal(product) {
    // Hapus modal lama jika ada
    const oldModal = document.getElementById('dynamic-modal');
    if (oldModal) oldModal.remove();
    
    const modalHtml = `
      <div class="modal-overlay open" id="dynamic-modal" onclick="if(event.target===this)App.closeDynamicModal()">
        <div class="modal" style="max-width: 400px;">
          <button class="modal-close" onclick="App.closeDynamicModal()">✕</button>
          <h2 class="modal-title">${this.escapeHtml(product.name)}</h2>
          <div style="text-align: center; font-size: 48px; margin: 16px 0;">
            ${product.image_url ? '' : '📦'}
          </div>
          <div style="margin-bottom: 16px;">
            <div style="color: var(--brand); font-size: 24px; font-weight: 700;">${formatRupiah(product.price)}</div>
            <div style="font-size: 13px; color: var(--text-muted);">Stok tersedia: ${product.stock}</div>
          </div>
          <div class="form-group">
            <label class="form-label">Jumlah</label>
            <div style="display: flex; align-items: center; gap: 16px;">
              <button class="btn btn-secondary btn-sm" onclick="App.changeQty(-1)">-</button>
              <span id="modal-qty" style="font-size: 20px; font-weight: 700; min-width: 40px; text-align: center;">1</span>
              <button class="btn btn-secondary btn-sm" onclick="App.changeQty(1)">+</button>
            </div>
          </div>
          <div class="cart-total-row" style="margin: 16px 0;">
            <span>Subtotal</span>
            <span class="cart-total-value" id="modal-subtotal" style="font-size: 20px;">${formatRupiah(product.price)}</span>
          </div>
          <button class="btn btn-primary btn-full" onclick="App.addToCart()">Tambah ke Keranjang</button>
        </div>
      </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  },

  changeQty(delta) {
    if (!AppState.selectedProduct) return;
    const newQty = AppState.selectedQty + delta;
    if (newQty >= 1 && newQty <= AppState.selectedProduct.stock) {
      AppState.selectedQty = newQty;
      const qtyEl = document.getElementById('modal-qty');
      const subtotalEl = document.getElementById('modal-subtotal');
      if (qtyEl) qtyEl.textContent = newQty;
      if (subtotalEl) subtotalEl.textContent = formatRupiah(AppState.selectedProduct.price * newQty);
    } else if (newQty > AppState.selectedProduct.stock) {
      showToast(`Stok hanya tersisa ${AppState.selectedProduct.stock}`, 'warning');
    }
  },

  closeDynamicModal() {
    const modal = document.getElementById('dynamic-modal');
    if (modal) modal.remove();
    AppState.selectedProduct = null;
    AppState.selectedQty = 1;
  },

  addToCart() {
    if (!AppState.selectedProduct) return;
    
    const existing = AppState.cart.find(item => item.id === AppState.selectedProduct.id);
    
    if (existing) {
      const newQty = existing.quantity + AppState.selectedQty;
      if (newQty <= AppState.selectedProduct.stock) {
        existing.quantity = newQty;
      } else {
        showToast(`Stok tidak mencukupi. Maksimal ${AppState.selectedProduct.stock}`, 'error');
        this.closeDynamicModal();
        return;
      }
    } else {
      AppState.cart.push({
        id: AppState.selectedProduct.id,
        name: AppState.selectedProduct.name,
        price: AppState.selectedProduct.price,
        quantity: AppState.selectedQty,
        image_url: AppState.selectedProduct.image_url,
        stock: AppState.selectedProduct.stock
      });
    }
    
    this.updateCartBadge();
    this.renderCart();
    this.closeDynamicModal();
    showToast(`${AppState.selectedProduct.name} ditambahkan ke keranjang`, 'success');
  },

  updateCartBadge() {
    const totalItems = AppState.cart.reduce((sum, item) => sum + item.quantity, 0);
    const badge = document.getElementById('cart-count');
    if (totalItems > 0) {
      badge.textContent = totalItems;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  },

  renderCart() {
    const cartBody = document.getElementById('cart-items-list');
    const cartTotal = document.getElementById('cart-total');
    const total = AppState.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    
    if (cartTotal) cartTotal.textContent = formatRupiah(total);
    
    if (!AppState.cart.length) {
      cartBody.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🛒</span>
          <div>Keranjang masih kosong</div>
        </div>
      `;
      return;
    }
    
    cartBody.innerHTML = AppState.cart.map(item => `
      <div style="display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);">
        <div style="width: 60px; height: 60px; background: var(--bg-elevated); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px;">
          ${item.image_url ? '' : '📦'}
        </div>
        <div style="flex: 1;">
          <div style="font-weight: 600;">${this.escapeHtml(item.name)}</div>
          <div style="font-size: 13px; color: var(--text-muted);">${formatRupiah(item.price)} x ${item.quantity}</div>
          <div style="font-weight: 700; color: var(--brand);">${formatRupiah(item.price * item.quantity)}</div>
        </div>
        <button onclick="App.removeFromCart('${item.id}')" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px;">🗑️</button>
      </div>
    `).join('');
  },

  removeFromCart(productId) {
    AppState.cart = AppState.cart.filter(item => item.id !== productId);
    this.updateCartBadge();
    this.renderCart();
    showToast('Produk dihapus dari keranjang', 'info');
  },

  openCart() {
    this.renderCart();
    document.getElementById('cart-sidebar').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');
  },

  closeCart() {
    document.getElementById('cart-sidebar').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
  },

  checkout() {
    if (!AppState.cart.length) {
      showToast('Keranjang masih kosong', 'error');
      return;
    }
    
    const total = AppState.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    showToast(`Checkout: Total ${formatRupiah(total)}. Silakan lanjutkan pembayaran.`, 'success');
    
    // Reset cart setelah checkout
    AppState.cart = [];
    this.updateCartBadge();
    this.renderCart();
    this.closeCart();
  },

  navigate(page) {
    AppState.currentPage = page;
    if (page === 'store') {
      document.getElementById('page-store').classList.add('active');
      document.getElementById('page-auth').classList.remove('active');
    }
  },

  showUserInfo() {
    if (AppState.user) {
      const isAdminText = AppState.user.isAdmin ? ' (Admin)' : '';
      showToast(`${AppState.user.email}${isAdminText}`, 'info');
    }
  }
};

// ==================== INITIALIZE ====================
document.addEventListener('DOMContentLoaded', () => {
  App.init();
});

// Global click handler untuk menutup cart
document.getElementById('cart-overlay')?.addEventListener('click', () => {
  App.closeCart();
});
</script>
</body>
</html>
